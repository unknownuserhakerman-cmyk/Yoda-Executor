<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoda Executor - #1 Roblox Script Executor</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        a { text-decoration: none; color: inherit; }

        /* ANIMATED BG */
        .bg-glow {
            position: fixed;
            top: -30%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: radial-gradient(ellipse at 20% 50%, rgba(124, 58, 237, 0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, rgba(168, 85, 247, 0.05) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 80%, rgba(88, 101, 242, 0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: bgPulse 8s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { transform: scale(1) rotate(0deg); opacity: 0.8; }
            100% { transform: scale(1.1) rotate(3deg); opacity: 1; }
        }

        /* HEADER */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 1000;
            padding: 0 2rem;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: #fff;
            font-weight: 800;
        }

        .logo-text {
            background: linear-gradient(135deg, #fff 30%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
            list-style: none;
        }

        .nav-links a {
            font-size: 0.9rem;
            font-weight: 500;
            color: #888;
            transition: color 0.3s;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: #a855f7;
            transition: width 0.3s;
            border-radius: 2px;
        }

        .nav-links a:hover { color: #fff; }
        .nav-links a:hover::after { width: 100%; }

        .btn-download-nav {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: #fff !important;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            border: none;
        }

        .btn-download-nav:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.4);
        }
        .btn-download-nav::after { display: none !important; }

        /* HERO */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            padding-top: 90px;
            position: relative;
            z-index: 1;
        }

        .hero-content {
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: 50px;
            padding: 0.4rem 1.2rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: #a855f7;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1.5rem;
        }

        .hero-badge .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #28c840;
            animation: pulse 1.5s infinite;
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff 20%, #a855f7 50%, #7c3aed 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
        }

        .hero p {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 2rem;
            max-width: 600px;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 3rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: #fff;
            padding: 0.9rem 2.5rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            padding: 0.9rem 2.5rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: background 0.3s, border-color 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn-discord {
            background: #5865F2;
            color: #fff;
            padding: 0.9rem 2.5rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-discord:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(88, 101, 242, 0.5);
        }

        /* EXECUTOR UI MOCKUP */
        .executor-ui {
            width: 100%;
            max-width: 800px;
            background: #12121a;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.6), 0 0 60px rgba(124, 58, 237, 0.06);
            overflow: hidden;
            margin-top: 0.5rem;
            position: relative;
        }

        .executor-titlebar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1a24;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .executor-titlebar .left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .executor-titlebar .dots { display: flex; gap: 6px; }
        .executor-titlebar .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            transition: opacity 0.2s;
        }
        .executor-titlebar .dot:hover { opacity: 0.7; }
        .executor-titlebar .dot.red { background: #ff5f57; }
        .executor-titlebar .dot.yellow { background: #ffbd2e; }
        .executor-titlebar .dot.green { background: #28c840; }

        .executor-titlebar .title-text {
            color: #555;
            font-size: 0.8rem;
            font-weight: 500;
            font-family: 'Consolas', monospace;
        }
        .executor-titlebar .title-text span { color: #a855f7; }

        .executor-titlebar .right span {
            color: #444;
            font-size: 0.8rem;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .executor-titlebar .right span:hover { background: rgba(255,255,255,0.05); }

        .executor-toolbar {
            display: flex;
            align-items: center;
            gap: 2px;
            padding: 8px 16px;
            background: #14141e;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            flex-wrap: wrap;
        }

        .executor-toolbar .tab {
            padding: 5px 14px;
            border-radius: 6px;
            font-size: 0.78rem;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .executor-toolbar .tab.active {
            background: rgba(168, 85, 247, 0.12);
            color: #a855f7;
        }
        .executor-toolbar .tab:hover { background: rgba(255,255,255,0.04); color: #aaa; }

        .executor-toolbar .spacer { flex: 1; }

        .executor-toolbar .status {
            font-size: 0.72rem;
            color: #28c840;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 500;
        }
        .executor-toolbar .status .pulse {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #28c840;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.8); }
        }

        .executor-editor {
            padding: 16px;
            min-height: 240px;
            position: relative;
            background: #0e0e16;
        }

        .executor-editor .line-numbers {
            position: absolute;
            left: 16px;
            top: 16px;
            color: #333;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.78rem;
            line-height: 1.7;
            user-select: none;
        }

        .executor-editor .code-area {
            margin-left: 36px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.78rem;
            line-height: 1.7;
            color: #c0c0d0;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .executor-editor .code-area .keyword { color: #c792ea; font-weight: 600; }
        .executor-editor .code-area .string { color: #c3e88d; }
        .executor-editor .code-area .function { color: #82aaff; }
        .executor-editor .code-area .comment { color: #546e7a; font-style: italic; }
        .executor-editor .code-area .number { color: #f78c6c; }
        .executor-editor .code-area .global { color: #ffcb6b; }

        .executor-bottombar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: #14141e;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
        }

        .executor-bottombar .left-info {
            display: flex;
            gap: 16px;
            font-size: 0.72rem;
            color: #555;
        }
        .executor-bottombar .left-info span em { color: #777; font-style: normal; }

        .executor-bottombar .right-buttons { display: flex; gap: 8px; }

        .executor-bottombar .btn-execute {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: #fff;
            padding: 6px 24px;
            border-radius: 6px;
            font-size: 0.78rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .executor-bottombar .btn-execute:hover {
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
        }

        .executor-bottombar .btn-clear {
            background: rgba(255, 255, 255, 0.04);
            color: #666;
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 0.78rem;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .executor-bottombar .btn-clear:hover { background: rgba(255,255,255,0.08); }

        /* COUNTER BAR */
        .counter-bar {
            display: flex;
            justify-content: center;
            gap: 4rem;
            flex-wrap: wrap;
            padding: 1.5rem 2rem;
            background: rgba(255, 255, 255, 0.015);
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            position: relative;
            z-index: 1;
        }

        .counter-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #888;
            font-size: 0.85rem;
        }
        .counter-item .num {
            color: #a855f7;
            font-weight: 700;
            font-size: 1rem;
        }

        /* FEATURES */
        .features {
            padding: 5rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .features h2 {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .features .sub {
            text-align: center;
            color: #888;
            margin-bottom: 3rem;
            font-size: 1.05rem;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            transition: all 0.3s;
        }

        .feature-card:hover {
            border-color: rgba(168, 85, 247, 0.3);
            transform: translateY(-4px);
            background: rgba(168, 85, 247, 0.03);
        }

        .feature-card .icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .feature-card h3 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .feature-card p {
            color: #888;
            font-size: 0.9rem;
        }

        /* DOWNLOAD SECTION */
        .download-section {
            padding: 5rem 2rem;
            text-align: center;
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.01);
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .download-section h2 {
            font-size: 2.8rem;
            font-weight: 900;
            margin-bottom: 1rem;
        }

        .download-section h2 span {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .download-section p {
            color: #888;
            max-width: 600px;
            margin: 0 auto 2rem;
            font-size: 1.05rem;
        }

        .download-features {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin-bottom: 2.5rem;
        }

        .download-features span {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #aaa;
            font-size: 0.9rem;
        }

        .download-features span .check {
            color: #28c840;
            font-weight: 700;
        }

        .btn-download-big {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: #fff;
            padding: 1.2rem 3.5rem;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.3rem;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .btn-download-big:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(168, 85, 247, 0.5);
        }

        .version-info {
            margin-top: 1.5rem;
            color: #555;
            font-size: 0.85rem;
        }

        /* DISCORD SECTION */
        .discord-section {
            padding: 4rem 2rem;
            text-align: center;
            position: relative;
            z-index: 1;
            background: rgba(88, 101, 242, 0.02);
            border-bottom: 1px solid rgba(88, 101, 242, 0.08);
        }

        .discord-section h2 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .discord-section p {
            color: #888;
            max-width: 500px;
            margin: 0 auto 2rem;
        }

        /* FOOTER */
        footer {
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            padding: 2rem;
            text-align: center;
            color: #555;
            font-size: 0.85rem;
            position: relative;
            z-index: 1;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5rem; }
            .nav-links a:not(.btn-download-nav) { display: none; }
            .counter-bar { gap: 1.5rem; }
            .download-features { gap: 1rem; flex-direction: column; align-items: center; }
            .features h2 { font-size: 2rem; }
            .download-section h2 { font-size: 2rem; }
            .btn-download-big { padding: 1rem 2rem; font-size: 1.1rem; }
        }

        @media (max-width: 480px) {
            .hero h1 { font-size: 2rem; }
            .hero p { font-size: 1rem; }
            .hero-buttons { flex-direction: column; align-items: center; }
            .btn-primary, .btn-secondary, .btn-discord { width: 100%; justify-content: center; }
        }

        /* SCROLL SMOOTH */
        html { scroll-behavior: smooth; }

        /* INSTRUCTIONS TOAST */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1a1a24;
