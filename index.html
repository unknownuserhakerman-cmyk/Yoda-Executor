<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoda Executor - The Best Roblox Executor</title>
    <style>
        /* ---- RESET & BASE ---- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #16161e;
            color: #e0e0e0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* ---- HEADER / NAV ---- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(22, 22, 30, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            z-index: 1000;
            padding: 0 2rem;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: #fff;
            background: none;
            -webkit-text-fill-color: #fff;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
            list-style: none;
        }

        .nav-links a {
            font-size: 0.95rem;
            font-weight: 500;
            color: #a0a0b0;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #a855f7;
        }

        .btn-download {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: #fff !important;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-download:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.4);
        }

        /* ---- HERO ---- */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            background: radial-gradient(ellipse at 50% 30%, #1e1a2e 0%, #16161e 70%);
        }

        .hero-content {
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff 30%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.2rem;
            color: #a0a0b0;
            margin-bottom: 2rem;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 3rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: #fff;
            padding: 0.9rem 2.5rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.5);
        }

        .btn-secondary {
            background: transparent;
            color: #a855f7;
            padding: 0.9rem 2.5rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            border: 2px solid #a855f7;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-secondary:hover {
            background: rgba(168, 85, 247, 0.1);
        }

        .btn-discord {
            background: #5865F2;
            color: #fff;
            padding: 0.9rem 2.5rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-discord:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(88, 101, 242, 0.5);
        }

        /* ---- YODA EXECUTOR UI MOCKUP ---- */
        .executor-ui {
            width: 100%;
            max-width: 780px;
            background: #1a1c2a;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 40px rgba(168, 85, 247, 0.08);
            overflow: hidden;
            margin-top: 0.5rem;
            position: relative;
        }

        .executor-titlebar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #22243a;
            padding: 10px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .executor-titlebar .left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .executor-titlebar .dots {
            display: flex;
            gap: 6px;
        }

        .executor-titlebar .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .executor-titlebar .dot.red { background: #ff5f57; }
        .executor-titlebar .dot.yellow { background: #ffbd2e; }
        .executor-titlebar .dot.green { background: #28c840; }

        .executor-titlebar .title-text {
            color: #808090;
            font-size: 0.85rem;
            font-weight: 500;
            margin-left: 6px;
        }

        .executor-titlebar .title-text span {
            color: #a855f7;
        }

        .executor-titlebar .right {
            display: flex;
            gap: 12px;
        }

        .executor-titlebar .right span {
            color: #606070;
            font-size: 0.8rem;
            cursor: default;
        }

        .executor-toolbar {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            background: #1e2030;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            flex-wrap: wrap;
        }

        .executor-toolbar .tab {
            padding: 5px 14px;
            border-radius: 6px;
            font-size: 0.8rem;
            color: #808090;
            cursor: default;
            background: transparent;
            transition: background 0.2s, color 0.2s;
        }

        .executor-toolbar .tab.active {
            background: rgba(168, 85, 247, 0.15);
            color: #a855f7;
        }

        .executor-toolbar .tab:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #d0d0e0;
        }

        .executor-toolbar .spacer {
            flex: 1;
        }

        .executor-toolbar .status {
            font-size: 0.75rem;
            color: #28c840;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .executor-toolbar .status .pulse {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #28c840;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .executor-editor {
            padding: 16px;
            min-height: 220px;
            position: relative;
        }

        .executor-editor .line-numbers {
            position: absolute;
            left: 16px;
            top: 16px;
            color: #404050;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.8rem;
            line-height: 1.7;
            user-select: none;
        }

        .executor-editor .code-area {
            margin-left: 32px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.8rem;
            line-height: 1.7;
            color: #c0c0d0;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .executor-editor .code-area .keyword { color: #c792ea; }
        .executor-editor .code-area .string { color: #c3e88d; }
        .executor-editor .code-area .function { color: #82aaff; }
        .executor-editor .code-area .comment { color: #546e7a; font-style: italic; }
        .executor-editor .code-area .number { color: #f78c6c; }
        .executor-editor .code-area .global { color: #ffcb6b; }

        .executor-bottombar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: #1e2030;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }

        .executor-bottombar .left-info {
            display: flex;
            gap: 16px;
            font-size: 0.75rem;
            color: #606070;
        }

        .executor-bottombar .left-info span em {
            color: #808090;
            font-style: normal;
        }

        .executor-bottombar .right-buttons {
            display: flex;
            gap: 8px;
        }

        .executor-bottombar .btn-execute {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: #fff;
            padding: 6px 22px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: transform 0.15s;
        }

        .executor-bottombar .btn-execute:hover {
            transform: scale(1.03);
        }

        .executor-bottombar .btn-clear {
            background: rgba(255, 255, 255, 0.06);
            color: #808090;
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 0.8rem;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .executor-bottombar .btn-clear:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* ---- COUNTER BAR ---- */
        .counter-bar {
            display: flex;
            justify-content: center;
            gap: 3rem;
            flex-wrap: wrap;
            padding: 1.2rem 2rem;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .counter-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #808090;
            font-size: 0.85rem;
        }

        .counter-item .num {
            color: #a855f7;
            font-weight: 700;
            font-size: 0.95rem;
        }

        /* ---- FEATURES ---- */
        .features {
            padding: 5rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .features h2 {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 3rem;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            transition: border-color 0.3s, transform 0.3s;
        }

        .feature-card:hover {
            border-color: #a855f7;
            transform: translateY(-5px);
        }

        .feature-card .icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .feature-card h3 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }

        .feature-card p {
            color: #a0a0b0;
            font-size: 0.95rem;
        }

        /* ---- PRICING ---- */
        .pricing {
            padding: 5rem 2rem;
            background: rgba(255, 255, 255, 0.02);
        }

        .pricing h2 {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .pricing-sub {
            text-align: center;
            color: #a0a0b0;
            margin-bottom: 3rem;
        }

        .pricing-grid {
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
        }

        .pricing-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            text-align: center;
            transition: transform 0.3s, border-color 0.3s;
            position: relative;
        }

        .pricing-card.featured {
            border-color: #a855f7;
            background: rgba(168, 85, 247, 0.05);
        }

        .pricing-card.featured::before {
            content: "MOST POPULAR";
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: #fff;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.3rem 1.2rem;
            border-radius: 50px;
            letter-spacing: 1px;
        }

        .pricing-card .plan-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .pricing-card .price {
            font-size: 3rem;
            font-weight: 800;
            margin: 1rem 0;
        }

        .pricing-card .price span {
            font-size: 1rem;
            font-weight: 400;
            color: #a0a0b0;
        }

        .pricing-card ul {
            list-style: none;
            margin: 1.5rem 0;
            text-align: left;
        }

        .pricing-card ul li {
            padding: 0.5rem 0;
            color: #c0c0d0;
            font-size: 0.95rem;
        }

        .pricing-card ul li::before {
            content: "✓ ";
            color: #a855f7;
            font-weight: 700;
        }

        .pricing-card .btn-primary,
        .pricing-card .btn-secondary {
            width: 100%;
            margin-top: 0.5rem;
            justify-content: center;
            display: block;
            text-align: center;
        }

        /* ---- REVIEWS ---- */
        .reviews {
            padding: 4rem 2rem;
            max-width: 900px;
            margin: 0 auto;
        }

        .reviews h2 {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 2rem;
            color: #a0a0b0;
        }

        .reviews-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .review-card {
            display: flex;
            gap: 1rem;
            align-items: flex-start;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 1rem 1.2rem;
        }

        .review-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            color: #fff;
            flex-shrink: 0;
        }

        .review-avatar.blue {
            background: linear-gradient(135deg, #2563eb, #3b82f6);
        }

        .review-avatar.green {
            background: linear-gradient(135deg, #059669, #10b981);
        }

        .review-avatar.orange {
            background: linear-gradient(135deg, #d97706, #f59e0b);
        }

        .review-avatar.red {
            background: linear-gradient(135deg, #dc2626, #ef4444);
        }

        .review-avatar.teal {
            background: linear-gradient(135deg, #0d9488, #14b8a6);
        }

        .review-content {
            flex: 1;
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.2rem;
        }

        .review-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: #d0d0e0;
        }

        .review-date {
            font-size: 0.75rem;
            color: #606070;
        }

        .review-stars {
            color: #f59e0b;
            font-size: 0.8rem;
            letter-spacing: 1px;
            margin-bottom: 0.3rem;
        }

        .review-text {
            font-size: 0.85rem;
            color: #a0a0b0;
            line-height: 1.5;
        }

        .review-badge {
            font-size: 0.65rem;
            background: rgba(168, 85, 247, 0.15);
            color: #a855f7;
            padding: 0.15rem 0.5rem;
            border-radius: 50px;
            font-weight: 600;
            margin-left: 0.5rem;
        }

        .review-badge.pro {
            background: rgba(88, 101, 242, 0.15);
            color: #818cf8;
        }

        /* ---- DOWNLOAD ---- */
        .download {
            padding: 5rem 2rem;
            text-align: center;
        }

        .download h2 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .download p {
            color: #a0a0b0;
            max-width: 600px;
            margin: 0 auto 2rem;
        }

        .download .btn-primary {
            font-size: 1.2rem;
            padding: 1rem 3rem;
        }

        .version-info {
            margin-top: 1.5rem;
            color: #606070;
            font-size: 0.85rem;
        }

        /* ---- DISCORD SECTION ---- */
        .discord-section {
            padding: 4rem 2rem;
            text-align: center;
            background: rgba(88, 101, 242, 0.03);
            border-top: 1px solid rgba(88, 101, 242, 0.1);
            border-bottom: 1px solid rgba(88, 101, 242, 0.1);
        }

        .discord-section h2 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .discord-section p {
            color: #a0a0b0;
            max-width: 600px;
            margin: 0 auto 2rem;
        }

        /* ---- FOOTER ---- */
        footer {
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding: 2rem;
            text-align: center;
            color: #606070;
            font-size: 0.9rem;
        }

        /* ---- RESPONSIVE ---- */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.2rem;
            }

            .nav-links {
                gap: 1rem;
            }

            .nav-links a:not(.btn-download) {
                display: none;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-
